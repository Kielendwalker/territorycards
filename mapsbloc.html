    const SEGMENTS = [{"id":"kdl-1","label":"KDL 1","count":46,"color":"#f8971b"},{"id":"kdl-2","label":"KDL 2","count":47,"color":"#009d57"},{"id":"kdl-3","label":"KDL 3","count":26,"color":"#4186f0"},{"id":"kdl-4","label":"KDL 4","count":33,"color":"#a61b4a"},{"id":"umum","label":"Umum","count":3,"color":"#795548"}];

    const layerByName = new Map();
    let selectedMarker = null;

    const map = L.map("map", { zoomControl: false, preferCanvas: true }).setView([-6.2045, 106.7615], 13);
    L.control.zoom({ position: "topright" }).addTo(map);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(map);
    const allGroup = L.featureGroup().addTo(map);

    // Zoom-based Label Logic
    function toggleLabels() {
      const zoom = map.getZoom();
      layerByName.forEach(layer => {
        // Show labels only when zoomed in (e.g., 15+)
        if (zoom >= 15) {
          if (!layer.isTooltipOpen()) layer.openTooltip();
        } else {
          layer.closeTooltip();
        }
      });
    }
    map.on('zoomend', toggleLabels);

    function toLatLngs(area) { return area.coords.map((ring) => ring.map(([lng, lat]) => [lat, lng])); }

    function styleForArea(area, selected = false, dimmed = false) {
      if (selected) return { color: "#d96c00", fillColor: "#ffcf5a", fillOpacity: 0.65, opacity: 1, weight: 4 };
      const baseFill = area.fillOpacity || 0.3;
      return { color: area.stroke || area.color, fillColor: area.color, fillOpacity: dimmed ? (baseFill * 0.7) : Math.max(baseFill, 0.25), opacity: dimmed ? 0.7 : 0.85, weight: dimmed ? 1 : 1.5 };
    }

    function fitLayers(layers, maxZoom = 17) {
      if (!layers.length) return;
      const group = L.featureGroup(layers);
      map.fitBounds(group.getBounds(), { padding: [50, 50], maxZoom, animate: true });
    }

    function resetMarker() { if (selectedMarker) { selectedMarker.remove(); selectedMarker = null; } }

    function setMapState(state, payload = null) {
      resetMarker();
      
      if (state === 'ALL') {
        document.body.classList.remove('has-selection');
        const allLayers = [];
        (AREA_DATA || []).forEach(area => {
          const layer = layerByName.get(area.name);
          layer.setStyle(styleForArea(area));
          if (!map.hasLayer(layer)) layer.addTo(map);
          allLayers.push(layer);
        });
        if (allLayers.length > 0) fitLayers(allLayers, 17);
      } 
      else if (state === 'SEGMENT') {
        document.body.classList.add('has-selection');
        const segmentLayers = [];
        (AREA_DATA || []).forEach(area => {
          const layer = layerByName.get(area.name);
          const visible = area.segmentId === payload;
          layer.setStyle(styleForArea(area));
          if (visible) { if(!map.hasLayer(layer)) layer.addTo(map); segmentLayers.push(layer); } else { layer.remove(); }
        });
        fitLayers(segmentLayers, 16);
      } 
      else if (state === 'AREA') {
        document.body.classList.add('has-selection');
        let selectedLayer = null;
        (AREA_DATA || []).forEach(area => {
          const layer = layerByName.get(area.name);
          const isSelected = area.name === payload;
          layer.setStyle(styleForArea(area, isSelected, !isSelected));
          if (!map.hasLayer(layer)) layer.addTo(map);
          if (isSelected) { selectedLayer = layer; selectedLayer.bringToFront(); }
        });

        if (selectedLayer) {
          const center = selectedLayer.getBounds().getCenter();
          selectedMarker = L.circleMarker(center, { radius: 6, color: "#172033", weight: 2, fillColor: "#ffffff", fillOpacity: 1 }).addTo(map);
          fitLayers([selectedLayer], 18);
        }
      }
      toggleLabels(); // Refresh labels based on new zoom
    }

    // Event listener for external state changes
    window.addEventListener('storage', (event) => {
      if (event.key === 'srengseng_shared_state' && event.newValue) {
        const data = JSON.parse(event.newValue);
        if (data.type === 'SHOW_ALL') setMapState('ALL');
        if (data.type === 'SHOW_SEGMENT') setMapState('SEGMENT', data.payload);
        if (data.type === 'SHOW_AREA') setMapState('AREA', data.payload);
      }
    });

    // Initialization
    if (AREA_DATA && AREA_DATA.length > 0) {
      AREA_DATA.forEach(area => {
        // permanent: false allows us to toggle visibility via toggleLabels
        const layer = L.polygon(toLatLngs(area), styleForArea(area))
          .bindTooltip(area.name, { permanent: false, direction: "center", className: "area-label" })
          .on("click", () => {
            setMapState('AREA', area.name); 
            localStorage.setItem('srengseng_shared_state', JSON.stringify({ type: 'AREA_CLICKED', payload: area.name, timestamp: Date.now() }));
          });
        layer.addTo(allGroup);
        layerByName.set(area.name, layer);
      });
      setMapState('ALL');
    }
  </script>
